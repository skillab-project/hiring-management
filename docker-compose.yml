services:

  hiring-management-backend:
    build: .
    image: ${DOCKER_REG}${DOCKER_REPO}${APP_NAME}:${DOCKER_TAG}
    container_name: hiring-management-backend
    ports:
      - "8890:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://employee-management-db:5432/labourpulse_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
    volumes:
      - hiring-cvs-data:/data/file-storage/cvs
    networks:
      - shared-net
    labels:
      io.portainer.accesscontrol.teams: skillab-all
      
networks:
  shared-net:
    external: true

volumes:
  hiring-cvs-data:
    labels:
      io.portainer.accesscontrol.teams: skillab-all