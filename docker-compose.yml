services:
  db:
    image: postgres:16-alpine
    container_name: hiring-manager-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      
    volumes:
      - postgres-data:/var/lib/postgresql/data
      
    ports:
      - "5434:5432"
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labourpulse_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      
    networks:
      - hiring-management-network
    labels:
      io.portainer.accesscontrol.teams: skillab-all

  app:
    build: .
    image: ${DOCKER_REG}${DOCKER_REPO}${APP_NAME}:${DOCKER_TAG}
    container_name: hiring-management-backend
    
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8890:8080"
    networks:
      - hiring-management-network
    env_file:
      - .env
    labels:
      io.portainer.accesscontrol.teams: skillab-all
      
      
networks:
  hiring-management-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
